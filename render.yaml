services:
  - type: web
    name: doc-intelligence-ai-backend
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: GROQ_API_KEY
        sync: false          # set manually in Render dashboard
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: LANCEDB_PATH
        value: /tmp/lancedb_data   # ephemeral — resets on restart, fine for demo
